name: Windows Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'package-lock.json'
      - 'index.html'
      - 'vite.config.*'
      - '.github/workflows/windows-package.yml'

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
          key: windows-package

      - name: Install npm dependencies
        run: npm ci

      - name: Build Windows package
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_KEY_PASSWORD }}
        run: npx @tauri-apps/cli build

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: ai-terminal-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload NSIS setup
        uses: actions/upload-artifact@v4
        with:
          name: ai-terminal-windows-setup
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
