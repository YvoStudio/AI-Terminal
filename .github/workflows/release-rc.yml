name: Release RC

on:
  workflow_dispatch:
    inputs:
      rc:
        description: 'RC 后缀 (例如 rc2)'
        required: true
        default: 'rc2'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-14'
            args: '--target aarch64-apple-darwin'
            label: 'macos-arm64'
          - platform: 'macos-14'
            args: '--target x86_64-apple-darwin'
            label: 'macos-x64'
          - platform: 'ubuntu-22.04'
            args: ''
            label: 'linux'
          - platform: 'windows-latest'
            args: ''
            label: 'windows'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read package version
        id: pkg
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Compute tag
        id: tag
        shell: bash
        run: echo "name=v${{ steps.pkg.outputs.version }}-${{ inputs.rc }}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
          key: ${{ matrix.label }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: 'AI-Terminal ${{ steps.tag.outputs.name }}'
          releaseBody: |
            Release candidate build of v${{ steps.pkg.outputs.version }} (${{ inputs.rc }}).
            Built from commit ${{ github.sha }}.
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}
