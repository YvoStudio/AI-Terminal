<!DOCTYPE html>
<html lang="zh" style="color-scheme: dark;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Terminal</title>
  <link rel="stylesheet" href="/src/styles/main.css">
  <link rel="stylesheet" href="/node_modules/@xterm/xterm/css/xterm.css">
</head>
<body>
  <div id="app">
    <div id="tab-bar" data-tauri-drag-region>
      <div id="traffic-light-spacer" data-tauri-drag-region></div>
      <div id="tab-list"></div>
      <button id="new-tab-btn" title="New Tab (⌘T)">+</button>
      <div class="tab-bar-spacer" data-tauri-drag-region></div>
      <button id="btn-toggle-notepad" class="tab-bar-btn" title="笔记面板">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M13 1H3a1 1 0 00-1 1v12a1 1 0 001 1h10a1 1 0 001-1V2a1 1 0 00-1-1zM4 4h8v1H4zm0 3h8v1H4zm0 3h5v1H4z"/></svg>
      </button>
      <div id="window-controls" class="window-controls">
        <button id="btn-minimize" class="window-control-btn" title="最小化">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M1 6h10"/></svg>
        </button>
        <button id="btn-maximize" class="window-control-btn" title="最大化">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M2 2v8h8V2H2zm7 7H3V3h6v6z"/></svg>
        </button>
        <button id="btn-close" class="window-control-btn close" title="关闭">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M.879.879L6 6l5.121-5.121.879.879L6.879 6.879 12 12l-.879.879L6 7.757.879 12.879 0 12l5.121-5.121L0 .879z"/></svg>
        </button>
      </div>
    </div>
    <div id="main-content">
      <div id="terminal-container"></div>
      <div id="notepad-resize-handle"></div>
      <div id="notepad" class="hidden">
        <div id="notepad-header">
          <span>Notepad</span>
          <button id="notepad-add-block" title="添加文本块">+</button>
        </div>
        <div id="notepad-blocks"></div>
      </div>
    </div>
    <div id="bottom-bar">
      <div class="bottom-bar-tools">
        <button id="btn-attach" class="bottom-btn" data-tooltip="插入路径">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M14 4.5V14a2 2 0 01-2 2H4a2 2 0 01-2-2V2a2 2 0 012-2h5.5L14 4.5zM10 4a1 1 0 001 1h2.5L10 1.5V4zM4.5 12.5a.5.5 0 01-.5-.5V9.5a.5.5 0 01.5-.5h7a.5.5 0 01.5.5V12a.5.5 0 01-.5.5h-7z"/></svg>
        </button>
        <button id="btn-history" class="bottom-btn" data-tooltip="历史会话">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm0 12.5a5.5 5.5 0 110-11 5.5 5.5 0 010 11zM7.5 4v4.5l3 1.5.5-1-2.5-1.25V4z"/></svg>
        </button>
      </div>
      <div class="bottom-bar-spacer"></div>
      <div class="bottom-bar-info">
        <span id="status-tabs"></span>
        <span id="status-state"></span>
        <span id="btn-tips" class="bottom-btn" data-tooltip="使用技巧">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm0 12.5a5.5 5.5 0 110-11 5.5 5.5 0 010 11zM7.25 10.5h1.5V12h-1.5zm.25-1h1V5h-1z"/></svg>
        </span>
        <span id="status-theme" title="切换主题"></span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
