<!DOCTYPE html>
<html lang="zh" style="color-scheme: dark;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Terminal</title>
  <link rel="stylesheet" href="/src/styles/main.css">
  <link rel="stylesheet" href="/node_modules/@xterm/xterm/css/xterm.css">
</head>
<body>
  <div id="app">
    <div id="tab-bar" data-tauri-drag-region>
      <div id="traffic-light-spacer" data-tauri-drag-region></div>
      <div id="tab-list"></div>
      <button id="new-tab-btn" title="New Tab (⌘T)">+</button>
      <div class="tab-bar-spacer" data-tauri-drag-region></div>
      <div id="window-controls" class="window-controls">
        <button id="btn-minimize" class="window-control-btn" title="最小化">
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 6h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <button id="btn-maximize" class="window-control-btn" title="最大化">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M2 2v8h8V2H2zm7 7H3V3h6v6z"/></svg>
        </button>
        <button id="btn-close" class="window-control-btn close" title="关闭">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M.879.879L6 6l5.121-5.121.879.879L6.879 6.879 12 12l-.879.879L6 7.757.879 12.879 0 12l5.121-5.121L0 .879z"/></svg>
        </button>
      </div>
    </div>
    <div id="main-content">
      <div id="terminal-container"></div>
    </div>
    <div id="bottom-bar">
      <div class="bottom-bar-tools">
        <button id="btn-file" class="bottom-btn" data-tooltip="插入文件">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M13 1H5a1 1 0 00-1 1v2H3a1 1 0 00-1 1v9a1 1 0 001 1h8a1 1 0 001-1v-2h1a1 1 0 001-1V3l-2-2zm-3 13H4V6h6v8zm3-3h-1V5a1 1 0 00-1-1H6V3h4l2 2v6z"/></svg>
        </button>
        <button id="btn-dir" class="bottom-btn" data-tooltip="插入目录">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M14 3H7.5L6 1.5H2a1 1 0 00-1 1v11a1 1 0 001 1h12a1 1 0 001-1V4a1 1 0 00-1-1z"/></svg>
        </button>
        <button id="btn-history" class="bottom-btn" data-tooltip="历史会话">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm0 12.5a5.5 5.5 0 110-11 5.5 5.5 0 010 11zM7.5 4v4.5l3 1.5.5-1-2.5-1.25V4z"/></svg>
        </button>
        <span class="bottom-bar-divider"></span>
        <div id="quick-commands" class="quick-commands"></div>
        <button id="btn-quick-add" class="bottom-btn" data-tooltip="新增快捷输入">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M8 3a1 1 0 011 1v3h3a1 1 0 110 2H9v3a1 1 0 11-2 0V9H4a1 1 0 110-2h3V4a1 1 0 011-1z"/></svg>
        </button>
      </div>
      <div class="bottom-bar-spacer"></div>
      <span id="status-cwd" class="bottom-bar-cwd"></span>
      <span id="status-branch" class="bottom-bar-branch">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M9.5 3.25a2.25 2.25 0 1 1 3 2.122V6A2.5 2.5 0 0 1 10 8.5H6a1 1 0 0 0-1 1v1.128a2.251 2.251 0 1 1-1.5 0V5.372a2.25 2.25 0 1 1 1.5 0v1.836A2.493 2.493 0 0 1 6 7h4a1 1 0 0 0 1-1v-.628a2.25 2.25 0 0 1-1.5-2.122ZM3.5 3.25a.75.75 0 1 0 1.5 0 .75.75 0 0 0-1.5 0Zm8.25-.75a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5ZM4.25 12a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5Z"/></svg>
        <span id="status-branch-name"></span>
      </span>
      <div class="bottom-bar-spacer"></div>
      <div class="bottom-bar-info">
        <span id="btn-tips" class="bottom-btn" data-tooltip="使用技巧">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm0 12.5a5.5 5.5 0 110-11 5.5 5.5 0 010 11zM7.25 10.5h1.5V12h-1.5zm.25-1h1V5h-1z"/></svg>
        </span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
