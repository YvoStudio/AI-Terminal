<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Terminal</title>
  <link rel="stylesheet" href="/src/styles/main.css">
  <link rel="stylesheet" href="/node_modules/@xterm/xterm/css/xterm.css">
</head>
<body>
  <div id="app">
    <div id="tab-bar">
      <div id="tab-list"></div>
      <button id="new-tab-btn" title="New Tab (Ctrl+T)">+</button>
      <div class="tab-bar-spacer"></div>
      <button id="btn-toggle-notepad" class="tab-bar-btn" title="笔记面板">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M13 1H3a1 1 0 00-1 1v12a1 1 0 001 1h10a1 1 0 001-1V2a1 1 0 00-1-1zM4 4h8v1H4zm0 3h8v1H4zm0 3h5v1H4z"/></svg>
      </button>
    </div>
    <div id="body-row">
      <div id="activity-bar">
        <div id="btn-toggle-sidebar" class="activity-btn active" title="Chat History">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M1 2.5h4v11H1zm5.5 0h8v11h-8z"/></svg>
        </div>
        <div class="activity-divider"></div>
        <div id="btn-add-image" class="activity-btn" title="选择图片">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M14 1H2a1 1 0 00-1 1v12a1 1 0 001 1h12a1 1 0 001-1V2a1 1 0 00-1-1zm-1 12H3l3-4 1.5 2L10 8l3 5zM5.5 7a1.5 1.5 0 110-3 1.5 1.5 0 010 3z"/></svg>
        </div>
        <div id="btn-add-file" class="activity-btn" title="选择文件">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M13 1H5a1 1 0 00-1 1v2H3a1 1 0 00-1 1v9a1 1 0 001 1h8a1 1 0 001-1v-2h1a1 1 0 001-1V3l-2-2zm-3 13H4V6h6v8zm3-3h-1V5a1 1 0 00-1-1H6V3h4l2 2v6z"/></svg>
        </div>
        <div id="btn-add-dir" class="activity-btn" title="选择目录">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M14 3H7.5L6 1.5H2a1 1 0 00-1 1v11a1 1 0 001 1h12a1 1 0 001-1V4a1 1 0 00-1-1z"/></svg>
        </div>
        <div class="activity-spacer"></div>
        <div id="btn-history" class="activity-btn" title="历史工作区">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm0 12.5a5.5 5.5 0 110-11 5.5 5.5 0 010 11zM7.5 4v4.5l3 1.5.5-1-2.5-1.25V4z"/></svg>
        </div>
      </div>
      <div id="main-content">
        <div id="sidebar">
          <div id="sidebar-header">Chat History</div>
          <div id="sidebar-entries"></div>
        </div>
        <div id="sidebar-resize-handle"></div>
        <div id="terminal-container"></div>
        <div id="notepad-resize-handle"></div>
        <div id="notepad" class="hidden">
          <div id="notepad-header">
            <span>Notepad</span>
            <button id="notepad-add-block" title="添加文本块">+</button>
          </div>
          <div id="notepad-blocks"></div>
        </div>
      </div>
    </div>
    <div id="status-bar">
      <span id="status-cwd"></span>
      <span id="status-tabs"></span>
      <span id="status-state"></span>
      <span class="status-spacer"></span>
      <span id="btn-tips" class="status-btn" title="使用技巧">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm0 12.5a5.5 5.5 0 110-11 5.5 5.5 0 010 11zM7.25 10.5h1.5V12h-1.5zm.25-1h1V5h-1z"/></svg>
        技巧
      </span>
      <span id="status-theme" title="切换主题"></span>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
